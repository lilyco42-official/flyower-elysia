<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>仪表盘 · 云枢智创</title>
  <link rel="icon" href="./icon/favicon.ico" type="image/x-icon" />
  <style>
    /* ── 重置与变量 ────────────────────────── */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --cream: #faf7f2;
      --warm: #f2ede4;
      --nude: #e8ddd0;
      --blush: #d4a5a5;
      --rose: #b87070;
      --clay: #8b5e5e;
      --ink: #2d2420;
      --ink2: #6b5c58;
      --ink3: #a49490;
      --white: #ffffff;
      --shadow: rgba(45, 36, 32, 0.08);
      --radius: 20px;
    }

    body {
      font-family: 'Noto Sans SC', system-ui, -apple-system, sans-serif;
      background: linear-gradient(145deg, var(--cream) 0%, var(--warm) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      margin: 0;
      color: var(--ink);
    }

    /* ── 主卡片 ───────────────────────────── */
    .dashboard-card {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1.5px solid var(--nude);
      border-radius: var(--radius);
      box-shadow: 0 20px 40px var(--shadow), 0 8px 16px rgba(0, 0, 0, 0.04);
      width: 100%;
      max-width: 480px;
      padding: 40px 32px;
      text-align: center;
      transition: transform 0.2s ease;
    }

    /* ── 品牌标识 ─────────────────────────── */
    .brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-style: italic;
      color: var(--clay);
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    .brand span {
      display: block;
      font-size: 0.8rem;
      font-style: normal;
      color: var(--ink3);
      font-family: 'Noto Sans SC', sans-serif;
      margin-top: -6px;
    }

    /* ── 欢迎标题 ─────────────────────────── */
    h1 {
      font-family: var(--font-serif, 'Cormorant Garamond', serif);
      font-size: 1.8rem;
      font-weight: 500;
      color: var(--clay);
      margin: 16px 0 8px;
    }

    /* ── 用户信息 ─────────────────────────── */
    #user {
      font-size: 1.2rem;
      color: var(--ink2);
      margin: 16px 0 20px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.5);
      border-radius: 60px;
      border: 1px solid var(--nude);
      box-shadow: inset 0 2px 4px var(--shadow);
    }

    /* ── 倒计时提示 ───────────────────────── */
    #countdown {
      font-size: 0.95rem;
      color: var(--ink3);
      background: var(--warm);
      padding: 10px 16px;
      border-radius: 40px;
      border: 1px solid var(--nude);
      margin: 20px 0 24px;
      display: inline-block;
      width: auto;
      min-width: 220px;
    }

    /* ── 按钮 ─────────────────────────────── */
    button {
      background: var(--clay);
      color: white;
      border: none;
      border-radius: 40px;
      padding: 12px 30px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 4px 10px rgba(139, 94, 94, 0.2);
      margin-top: 8px;
    }

    button:hover {
      background: var(--rose);
    }

    button:active {
      transform: scale(0.98);
    }

    /* ── 响应式微调 ──────────────────────── */
    @media (max-width: 480px) {
      .dashboard-card {
        padding: 32px 20px;
      }

      .brand {
        font-size: 1.8rem;
      }

      h1 {
        font-size: 1.5rem;
      }

      #user {
        font-size: 1rem;
        padding: 14px;
      }

      button {
        padding: 12px 24px;
        width: 100%;
      }

      #countdown {
        min-width: 180px;
        font-size: 0.85rem;
      }
    }

    @media (max-width: 360px) {
      .dashboard-card {
        padding: 24px 16px;
      }
    }

    /* ── 背景纹理（可选） ─────────────────── */
    body::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: 0.02;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px;
    }
  </style>
  <!-- 字体预连接 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="dashboard-card">
    <div class="brand">
      📌 lain42
      <span>云枢智创 · 图片社区</span>
    </div>

    <h1>欢迎回来</h1>
    <div id="user">加载中…</div>
    <div id="countdown"></div>

    <button onclick="logout()">退出登录</button>
  </div>

  <script>
    async function loadUser() {
      const token = localStorage.getItem('token');
      if (!token) {
        window.location.href = '/sign_in.html';
        return;
      }
      try {
        const res = await fetch('/me', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (res.ok) {
          const user = await res.json();
          document.getElementById('user').innerText = `你好，${user.username}`;
          // 登录成功，开始倒计时跳转
          startCountdown(3);
        } else {
          // token 无效或过期
          localStorage.removeItem('token');
          window.location.href = '/sign_in.html';
        }
      } catch (err) {
        console.error('网络错误', err);
        document.getElementById('user').innerText = '无法连接服务器';
        // 可选的错误处理，例如显示重试按钮
      }
    }

    function startCountdown(seconds) {
      const countdownEl = document.getElementById('countdown');
      countdownEl.innerText = `${seconds} 秒后自动跳转到首页...`;

      const interval = setInterval(() => {
        seconds--;
        if (seconds <= 0) {
          clearInterval(interval);
          window.location.href = '/index.html'; // 跳转到瀑布流首页
        } else {
          countdownEl.innerText = `${seconds} 秒后自动跳转到首页...`;
        }
      }, 1000);
    }

    function logout() {
      localStorage.removeItem('token');
      window.location.href = '/sign_in.html';
    }

    // 页面加载后立即执行
    loadUser();
  </script>
</body>
</html>
