<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户主页 · 云枢智创</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="icon" href="./icon/favicon.ico" type="image/x-icon" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    /* ── 重置与基础（复用主站完整样式） ─────────────────── */
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --cream:   #faf7f2;
      --warm:    #f2ede4;
      --nude:    #e8ddd0;
      --blush:   #d4a5a5;
      --rose:    #b87070;
      --clay:    #8b5e5e;
      --ink:     #2d2420;
      --ink2:    #6b5c58;
      --ink3:    #a49490;
      --white:   #ffffff;
      --shadow:  rgba(45,36,32,.08);
      --r:       16px;
      --nav-h:   62px;
      --font-serif: 'Cormorant Garamond', 'Noto Serif SC', serif;
      --font-sans:  'Noto Sans SC', sans-serif;
    }
    html { scroll-behavior:smooth; background:var(--cream); }
    body {
      font-family: var(--font-sans);
      color: var(--ink);
      font-size: 13px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    button { cursor:pointer; border:none; font-family:inherit; }
    a { text-decoration:none; color:inherit; }
    img { display:block; max-width:100%; }
    input, textarea, select { font-family: inherit; outline: none; }
    /* 选项卡 */
    .profile-tabs {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin: 20px 0 30px;
    }
    .tab-btn {
      background: none;
      border: none;
      padding: 8px 24px;
      font-size: 14px;
      color: var(--ink2);
      border-radius: 30px;
      transition: all .15s;
      cursor: pointer;
    }
    .tab-btn.active {
      background: var(--white);
      color: var(--clay);
      box-shadow: 0 2px 8px var(--shadow);
    }
    .tab-btn:hover:not(.active) {
      color: var(--ink);
    }
    
    /* 收藏夹网格 */
    .collections-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
      padding: 0 16px 30px;
    }
    .collection-card {
      background: var(--white);
      border-radius: var(--r);
      overflow: hidden;
      box-shadow: 0 2px 8px var(--shadow);
      cursor: pointer;
      transition: transform .22s;
    }
    .collection-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 28px rgba(139,94,94,.14);
    }
    .collection-cover {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: var(--warm);
      object-fit: cover;
    }
    .collection-info {
      padding: 10px;
    }
    .collection-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .collection-count {
      font-size: 11px;
      color: var(--ink3);
      margin-top: 2px;
    }
    /* 纹理 */
    body::before {
      content:'';
      position:fixed; inset:0; pointer-events:none; z-index:9998;
      opacity:.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px;
    }

    /* ── 导航（简化版，仅保留 logo 和用户芯片） ───────── */
    nav {
      position: fixed; top:0; left:0; right:0; z-index:1000;
      height: var(--nav-h);
      background: rgba(250,247,242,.88);
      backdrop-filter: blur(20px) saturate(1.4);
      border-bottom: 1px solid var(--nude);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px;
    }
    .logo {
      font-family: var(--font-serif);
      font-size: 1.35rem;
      font-style: italic;
      color: var(--clay);
      letter-spacing:.5px;
      display: flex; align-items: center; gap: 6px;
      cursor: pointer;
    }
    .logo span { font-style:normal; font-size:.7rem; color:var(--ink3); font-family:var(--font-sans); }

    /* 用户芯片（与主站一致） */
    .user-chip {
      display:flex; align-items:center; gap:8px;
      padding:4px 12px 4px 6px;
      border:1.5px solid var(--nude);
      border-radius:30px; cursor:pointer;
      transition:all .15s;
      position:relative;
    }
    .user-chip:hover { border-color:var(--blush); }
    .user-chip .av {
      width:28px; height:28px; border-radius:50%;
      background: linear-gradient(135deg, var(--blush), var(--rose));
      color:#fff; font-size:12px; font-weight:600;
      display:flex; align-items:center; justify-content:center;
      flex-shrink:0;
    }
    .user-chip .uname { font-size:12px; color:var(--ink2); font-weight:500; max-width:80px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

    /* 用户菜单（下拉） */
    .user-menu {
      display: none;
      position: absolute;
      top: 100%;
      right: 0;
      background: var(--white);
      border: 1.5px solid var(--nude);
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,.12);
      overflow: hidden;
      z-index: 1001;
      min-width: 160px;
      padding: 6px 0;
      animation: fadeIn 0.18s ease-out;
    }
    .user-menu .menu-btn {
      width: 100%;
      padding: 10px 16px;
      background: none;
      border: none;
      text-align: left;
      font-size: 13px;
      color: var(--ink2);
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    .user-menu .menu-btn:hover { background: var(--warm); color: var(--clay); }
    .user-menu .logout { color: var(--rose); }
    .user-menu .logout:hover { background: rgba(184, 112, 112, 0.1); }
    .user-menu .menu-divider { height: 1px; background: var(--nude); margin: 4px 0; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .btn-ghost {
      background:none;
      border:1.5px solid var(--nude);
      border-radius:30px; padding:6px 16px;
      font-size:12px; color:var(--ink2);
      transition:all .15s;
      display:inline-flex; align-items:center; gap:5px;
    }
    .btn-ghost:hover { border-color:var(--blush); color:var(--clay); }

    /* ── 主内容区 ────────────────────────────────── */
    main { padding-top: calc(var(--nav-h) + 20px); }

    /* ── 用户头部卡片 ─────────────────────────────── */
    .profile-header {
      max-width: 1000px;
      margin: 0 auto 30px;
      padding: 0 20px;
      display: flex;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
    }
    .profile-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--blush), var(--rose));
      color: white;
      font-size: 32px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 4px 12px var(--shadow);
      border: 3px solid var(--white);
    }
    .profile-info {
      flex: 1;
    }
    .profile-info h2 {
      font-family: var(--font-serif);
      font-size: 2rem;
      color: var(--clay);
      margin-bottom: 6px;
    }
    .profile-meta {
      display: flex;
      gap: 24px;
      color: var(--ink2);
      font-size: 0.9rem;
    }
    .profile-meta span {
      background: var(--warm);
      padding: 4px 12px;
      border-radius: 30px;
      border: 1px solid var(--nude);
    }
    .profile-actions {
      margin-left: auto;
    }
    .follow-btn {
      background: var(--clay);
      color: white;
      border: none;
      border-radius: 30px;
      padding: 8px 24px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s;
    }
    .follow-btn:hover { background: var(--rose); }
    .follow-btn.following {
      background: var(--white);
      color: var(--ink2);
      border: 1.5px solid var(--nude);
    }
    .follow-btn.following:hover { border-color: var(--blush); color: var(--clay); }

    /* ── 瀑布流网格（复用主站） ───────────────────── */
    .grid-wrap { padding: 0 16px 30px; max-width: 1400px; margin: 0 auto; }
    .masonry {
      column-count: 5;
      column-gap: 10px;
    }
    @media(max-width:1400px){.masonry{column-count:4}}
    @media(max-width:1100px){.masonry{column-count:3}}
    @media(max-width:700px) {.masonry{column-count:2}}

    .card {
      break-inside:avoid;
      margin-bottom:10px;
      border-radius:var(--r);
      overflow:hidden;
      background:var(--white);
      position:relative;
      cursor:pointer;
      box-shadow: 0 2px 8px var(--shadow);
      transition: transform .22s cubic-bezier(.34,1.56,.64,1), box-shadow .22s;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 28px rgba(139,94,94,.14);
    }
    .card-img {
      width:100%; display:block;
      background:var(--warm);
    }
    .card-overlay {
      position:absolute; inset:0;
      background:linear-gradient(to top, rgba(45,36,32,.72) 0%, rgba(45,36,32,.1) 45%, transparent 70%);
      opacity:0; transition:opacity .2s;
      display:flex; flex-direction:column; justify-content:flex-end; padding:12px;
    }
    .card:hover .card-overlay { opacity:1; }
    .card-title {
      font-size:12px; font-weight:500; color:#fff;
      margin-bottom:8px;
      text-shadow: 0 1px 4px rgba(0,0,0,.3);
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .card-row {
      display:flex; align-items:center; gap:6px;
    }
    .card-user {
      font-size:11px; color:rgba(255,255,255,.8);
      flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .card-btns { display:flex; gap:5px; }
    .c-btn {
      background:rgba(255,255,255,.2); backdrop-filter:blur(8px);
      border:1px solid rgba(255,255,255,.3);
      border-radius:8px; padding:5px 9px;
      color:#fff; font-size:11px; font-family:inherit;
      transition:background .15s;
      display:flex; align-items:center; gap:3px;
    }
    .c-btn:hover { background:rgba(255,255,255,.36); }
    .c-btn.liked { color:#ffb3b3; }

    /* 空状态 */
    .empty {
      padding:80px 20px; text-align:center; color:var(--ink3);
      grid-column: 1 / -1;
    }
    .empty .ei { font-size:48px; margin-bottom:14px; }

    /* ── 模态框（图片详情、收藏、上传）────────────── */
    /* （完整复制主站所有模态框样式，此处省略，保持代码简洁，实际使用时需包含）
        详见主站样式中的 .modal-bg, .modal, .detail-wrap 等 */
    /* 为节省篇幅，此处省略具体样式，实际实现时请粘贴主站对应部分 */
    /* ── 模态框占位 ───────────────────────────── */
    .modal-bg { display:none; /* 完整样式同主站 */ }
    /* ── Toast ───────────────────────────────── */
    #toast { /* 同主站 */ }

    /* 页脚 */
    .footer {
      background: #f8f8f8;
      text-align: center;
      padding: 16px 10px;
      font-size: 12px;
      border-top: 1px solid #ddd;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 30px;
    }
    .footer-logo { height: 16px; }
  </style>
</head>
<body>

<!-- ══ 导航（简化版）══════════════════════════════ -->
<nav>
  <div class="logo" onclick="location.href='/index.html'">
    📌 lain42
    <span>图片社区</span>
  </div>

  <div class="nav-right">
    <button class="btn-ghost" id="btnLogin" onclick="location.href='/sign_in.html'">登录</button>
    <div class="user-chip" id="userChip" style="display:none; position:relative;">
      <div class="av" id="chipAv"></div>
      <span class="uname" id="chipName"></span>
      <div class="user-menu" id="userMenu">
        <button class="menu-btn" onclick="goProfile()">个人主页</button>
        <button class="menu-btn" onclick="openUpload()">上传图片</button>
        <div class="menu-divider"></div>
        <button class="menu-btn logout" onclick="signOut()">退出登录</button>
      </div>
    </div>
  </div>
</nav>

<!-- ══ 主内容 ═══════════════════════════════════ -->
<main>
  <!-- 用户头部 -->
  <div class="profile-header" id="profileHeader">
    <div class="profile-avatar" id="profileAvatar"></div>
    <div class="profile-info">
      <h2 id="profileName">加载中…</h2>
      <div class="profile-meta">
        <span id="profileImageCount">0 张图片</span>
      </div>
    </div>
    <div class="profile-actions">
      <button class="follow-btn" id="followBtn" style="display:none;">关注</button>
    </div>
  </div>
  <!-- 选项卡切换 -->
  <div class="profile-tabs">
    <button class="tab-btn active" data-tab="images">图片</button>
    <button class="tab-btn" data-tab="collections">收藏夹</button>
  </div>
  
  <!-- 图片瀑布流容器（添加 id="imagesTab"） -->
  <div class="grid-wrap" id="imagesTab">
    <div class="masonry" id="grid"></div>
    <div class="empty" id="emptyState" style="display:none;">
      <div class="ei">🌸</div>
      <h3>这里还很安静</h3>
      <p>该用户还没有上传图片</p>
    </div>
  </div>
  
  <!-- 收藏夹列表容器（初始隐藏） -->
  <div class="collections-wrap" id="collectionsTab" style="display:none;">
    <div class="collections-grid" id="collectionsGrid"></div>
  </div>
</main>

<!-- ══ 模态框（从主站复制）══════════════════════ -->
<!-- 图片详情 -->
<div class="modal-bg" id="mDetail" style="padding:16px">
  <div class="detail-wrap modal" style="padding:0;max-width:820px;">
    <div class="detail-img" id="dtImgWrap"><img id="dtImg" alt=""></div>
    <div class="detail-side">
      <button class="dt-close" onclick="closeM('mDetail')">✕</button>
      <div class="dt-title" id="dtTitle"></div>
      <div class="dt-desc"  id="dtDesc"></div>
      <div class="dt-tags"  id="dtTags"></div>
      <div class="dt-user">
        <div class="dt-av" id="dtAv"></div>
        <div>
          <div class="dt-uname" id="dtUname"></div>
          <div class="dt-time"  id="dtTime"></div>
        </div>
      </div>
      <button class="dt-follow" id="dtFollowBtn" style="display:none" onclick="doFollow()"></button>
      <div class="dt-actions">
        <button class="dt-btn" id="dtLikeBtn" onclick="doDetailLike()">♥ <span id="dtLikeN">0</span></button>
        <button class="dt-btn rose" onclick="openCollect()">⊕ 收藏</button>
      </div>
    </div>
  </div>
</div>

<!-- 收藏夹模态框 -->
<div class="modal-bg" id="mCollect">
  <div class="modal">
    <div class="modal-title">保存到收藏夹</div>
    <button class="modal-close" onclick="closeM('mCollect')">✕</button>
    <div class="col-list" id="colList">加载中…</div>
    <div>
      <span class="new-col-toggle" onclick="this.nextElementSibling.classList.toggle('on')">＋ 新建收藏夹</span>
      <div class="new-col-form" id="newColForm">
        <input type="text" id="newColName" placeholder="收藏夹名称">
        <label><input type="checkbox" id="newColPub" checked> 公开</label>
        <button class="btn-primary" onclick="doCreateCol()">创建并收藏</button>
      </div>
    </div>
  </div>
</div>

<!-- 上传模态框（可选，保留功能） -->
<div class="modal-bg" id="mUpload">
  <div class="modal">
    <div class="modal-title">上传图片</div>
    <button class="modal-close" onclick="closeM('mUpload')">✕</button>
    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
      <input type="file" id="fileInput" accept="image/*" onchange="onFileChange(this)">
      <div class="dz-icon">🖼️</div>
      <div>点击或拖拽图片</div>
      <img id="previewImg" alt="">
    </div>
    <div class="quota-bar"><div class="quota-fill" id="quotaFill"></div></div>
    <div class="quota-text" id="quotaText"></div>
    <div class="field"><input id="upTitle" placeholder="标题"></div>
    <div class="field"><textarea id="upDesc" placeholder="描述"></textarea></div>
    <div class="field"><input id="upTags" placeholder="标签,逗号分隔"></div>
    <button class="btn-primary" onclick="doUpload()">上传</button>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- 页脚 -->
<footer class="footer">
  <img src="img/logo.png" alt="Logo" class="footer-logo">
  <a href="https://beian.mps.gov.cn/#/query/webSearch?code=34082602221152" target="_blank">皖公网安备34082602221152号</a>
  <span>云枢智创 皖ICP备2025106854号 开发小组：<a href="https://space.bilibili.com/450979843">lilyco-offical</a></span>
</footer>

<script>
  (function() {
    // ---------- 全局变量 ----------
    const token = localStorage.getItem('token');
    let me = null;
    let currentUsername = null;          // 当前查看的用户名
    let detailImg = null;                // 当前打开的图片详情
    let collectId = null;                // 正在收藏的图片ID

    // DOM 元素
    const gridEl = document.getElementById('grid');
    const emptyEl = document.getElementById('emptyState');
    const profileName = document.getElementById('profileName');
    const profileAvatar = document.getElementById('profileAvatar');
    const profileImageCount = document.getElementById('profileImageCount');
    const followBtn = document.getElementById('followBtn');
    const userChip = document.getElementById('userChip');
    const userMenu = document.getElementById('userMenu');
    const chipAv = document.getElementById('chipAv');
    const chipName = document.getElementById('chipName');
    const btnLogin = document.getElementById('btnLogin');

    // ---------- 工具函数 ----------
    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }
    function auth() { return { Authorization: `Bearer ${token}` }; }
    function openM(id) { document.getElementById(id).classList.add('on'); }
    function closeM(id) { document.getElementById(id).classList.remove('on'); }
    let toastTimer;
    function toast(msg, type='') {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = 'on ' + type;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.className='', 2600);
    }

    // ---------- 获取当前登录用户 ----------
    async function fetchMe() {
      if (!token) return;
      try {
        const r = await fetch('/me', { headers: auth() });
        if (!r.ok) { localStorage.removeItem('token'); return; }
        me = await r.json();
        btnLogin.style.display = 'none';
        userChip.style.display = 'flex';
        chipName.textContent = me.username;
        chipAv.textContent = me.username[0].toUpperCase();

        // 获取当前查看用户的资料（含关注状态）
        if (currentUsername) {
          await fetchUserProfile();
        }
      } catch (e) { console.error(e); }
    }

    // ---------- 获取用户资料（含关注状态）----------
    async function fetchUserProfile() {
      if (!currentUsername) return;
      try {
        const res = await fetch(`/users/${encodeURIComponent(currentUsername)}`, {
          headers: token ? auth() : {}
        });
        const data = await res.json();
        if (data.success) {
          const user = data.user;
          // 更新关注按钮状态
          if (me && me.username !== currentUsername) {
            followBtn.style.display = 'block';
            followBtn.textContent = user.is_following ? '已关注' : '关注';
            followBtn.className = 'follow-btn' + (user.is_following ? ' following' : '');
          } else {
            followBtn.style.display = 'none';
          }
        }
      } catch (err) {
        console.error('获取用户资料失败', err);
      }
    }

    // ---------- 关注/取消关注 ----------
    followBtn.addEventListener('click', async () => {
      if (!token) {
        location.href = '/sign_in.html';
        return;
      }
      
      const originalText = followBtn.textContent;
      const isFollowing = followBtn.classList.contains('following');
      
      try {
        const r = await fetch(`/users/${encodeURIComponent(currentUsername)}/follow`, {
          method: 'POST',
          headers: auth()
        });
        const d = await r.json();
        
        if (d.followed !== undefined) {
          const nowFollowing = d.followed;
          followBtn.textContent = nowFollowing ? '已关注' : '关注';
          followBtn.className = 'follow-btn' + (nowFollowing ? ' following' : '');
          toast(nowFollowing ? `已关注 @${currentUsername}` : `已取消关注 @${currentUsername}`);
        }
      } catch (err) {
        console.error(err);
        toast('操作失败，请重试', 'err');
        followBtn.textContent = originalText;
      }
    });

    // 用户菜单交互
    if (userChip) {
      userChip.addEventListener('click', (e) => {
        e.stopPropagation();
        userMenu.style.display = userMenu.style.display === 'none' ? 'block' : 'none';
      });
      document.body.addEventListener('click', () => { userMenu.style.display = 'none'; });
    }

    // 登出
    window.signOut = function() {
      localStorage.removeItem('token');
      location.href = '/sign_in.html';
    };
    window.goProfile = function() {
      if (me) location.href = `/user.html?u=${me.username}`;
    };

    // ---------- 从URL获取用户名 ----------
    const urlParams = new URLSearchParams(window.location.search);
    const usernameParam = urlParams.get('u');
    if (!usernameParam) {
      location.href = '/index.html';  // 没有用户名则返回首页
    }
    currentUsername = usernameParam;

    // ---------- 加载用户图片 ----------
    async function loadUserImages() {
      try {
        const res = await fetch(`/users/${encodeURIComponent(currentUsername)}/images`);
        const data = await res.json();
        if (!data.success) throw new Error(data.message);
        const images = data.images || [];

        // 更新头部信息
        profileName.textContent = currentUsername;
        profileAvatar.textContent = currentUsername[0].toUpperCase();
        profileImageCount.textContent = `${images.length} 张图片`;

        if (images.length === 0) {
          emptyEl.style.display = 'block';
          return;
        }
        emptyEl.style.display = 'none';

        // 渲染卡片
        images.forEach(img => appendCard(img));
      } catch (err) {
        console.error(err);
        toast('加载失败', 'err');
      }
    }

    // 卡片渲染（与主站一致）
    function appendCard(img) {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.id = img.id;

      const image = document.createElement('img');
      image.className = 'card-img';
      image.alt = img.title || '';
      image.loading = 'lazy';
      if (img.width && img.height) image.style.aspectRatio = `${img.width}/${img.height}`;
      image.src = `/uploads/${img.filename}`;

      const overlay = document.createElement('div');
      overlay.className = 'card-overlay';
      const likedClass = img.liked ? ' liked' : '';
      overlay.innerHTML = `
        <div class="card-title">${esc(img.title || '无标题')}</div>
        <div class="card-row">
          <span class="card-user" onclick="event.stopPropagation(); location.href='/user.html?u=${encodeURIComponent(img.username)}'">@${esc(img.username)}</span>
          <div class="card-btns">
            <button class="c-btn${likedClass}" data-like="${img.id}" onclick="event.stopPropagation();cardLike(${img.id},this)">
              ♥ <span class="lc">${img.like_count || 0}</span>
            </button>
            <button class="c-btn" onclick="event.stopPropagation();openCollect(${img.id})">⊕</button>
          </div>
        </div>`;

      card.appendChild(image);
      card.appendChild(overlay);
      card.addEventListener('click', () => openDetail(img.id));
      gridEl.appendChild(card);
    }

    // ---------- 图片详情 ----------
    window.openDetail = async function(id) {
      const r = await fetch(`/images/${id}`, { headers: token ? auth() : {} });
      const img = await r.json();
      detailImg = img;

      document.getElementById('dtImg').src = `/uploads/${img.filename}`;
      document.getElementById('dtTitle').textContent = img.title || '（无标题）';
      document.getElementById('dtDesc').textContent = img.description || '';
      document.getElementById('dtLikeN').textContent = img.like_count || 0;
      document.getElementById('dtAv').textContent = img.username[0].toUpperCase();
      document.getElementById('dtUname').textContent = img.username;
      document.getElementById('dtTime').textContent = img.created_at ? new Date(img.created_at).toLocaleDateString('zh-CN') : '';

      // 标签
      document.getElementById('dtTags').innerHTML = (img.tags || [])
        .map(t => `<span class="tag-pill" onclick="searchByTag('${esc(t)}')">#${esc(t)}</span>`)
        .join('');

      // 点赞状态
      document.getElementById('dtLikeBtn').style.color = img.liked ? 'var(--rose)' : '';

      // 关注按钮（如果查看的不是自己）
      const fbtn = document.getElementById('dtFollowBtn');
      if (me && me.username !== img.username) {
        fbtn.style.display = 'block';
        fbtn.dataset.uname = img.username;
        // 获取用户详情以确定是否已关注
        const ur = await fetch(`/users/${encodeURIComponent(img.username)}`, { headers: auth() });
        const ud = await ur.json();
        const following = ud.user?.is_following;
        fbtn.textContent = following ? '已关注' : '＋ 关注';
        fbtn.className   = 'dt-follow' + (following ? ' following' : '');
      } else {
        fbtn.style.display = 'none';
      }

      openM('mDetail');
    };

    window.doDetailLike = async function() {
      if (!token) { location.href='/sign_in.html'; return; }
      const r = await fetch(`/images/${detailImg.id}/like`, { method:'POST', headers:auth() });
      const d = await r.json();
      document.getElementById('dtLikeN').textContent = d.like_count;
      document.getElementById('dtLikeBtn').style.color = d.liked ? 'var(--rose)' : '';
      // 同步卡片
      const cardBtn = document.querySelector(`[data-id="${detailImg.id}"] [data-like]`);
      if (cardBtn) {
        cardBtn.classList.toggle('liked', d.liked);
        cardBtn.querySelector('.lc').textContent = d.like_count;
      }
      toast(d.liked ? '已点赞' : '取消点赞');
    };

    window.cardLike = async function(id, btn) {
      if (!token) { location.href='/sign_in.html'; return; }
      const r = await fetch(`/images/${id}/like`, { method:'POST', headers:auth() });
      const d = await r.json();
      btn.classList.toggle('liked', d.liked);
      btn.querySelector('.lc').textContent = d.like_count;
      toast(d.liked ? '已点赞' : '取消点赞');
    };

    // ---------- 收藏 ----------
    window.openCollect = function(imgId) {
      if (!token) { location.href='/sign_in.html'; return; }
      collectId = imgId || (detailImg && detailImg.id);
      if (!collectId) return;
      openM('mCollect');
      loadColList();
    };

    window.doFollow = async function() {
      if (!token) { location.href='/sign_in.html'; return; }
      const btn  = document.getElementById('dtFollowBtn');
      const uname = btn.dataset.uname;
      const r = await fetch(`/users/${encodeURIComponent(uname)}/follow`, { method:'POST', headers:auth() });
      const d = await r.json();
      btn.textContent = d.followed ? '已关注' : '＋ 关注';
      btn.className   = 'dt-follow' + (d.followed ? ' following' : '');
      toast(d.followed ? `已关注 @${uname}` : `已取关 @${uname}`, d.followed ? 'ok' : '');
    };
    
    // 选项卡切换
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const tab = btn.dataset.tab;
        if (tab === 'images') {
          document.getElementById('imagesTab').style.display = 'block';
          document.getElementById('collectionsTab').style.display = 'none';
        } else {
          document.getElementById('imagesTab').style.display = 'none';
          document.getElementById('collectionsTab').style.display = 'block';
          // 如果收藏夹尚未加载，则加载
          if (document.getElementById('collectionsGrid').children.length === 0) {
            loadUserCollections();
          }
        }
      });
    });
    
    // 加载用户收藏夹
    async function loadUserCollections() {
      try {
        const res = await fetch(`/users/${encodeURIComponent(currentUsername)}/collections`);
        const data = await res.json();
        if (!data.success) throw new Error(data.message);
        renderCollections(data.collections || []);
      } catch (err) {
        toast('加载收藏夹失败', 'err');
      }
    }
    
    // 渲染收藏夹卡片
    function renderCollections(collections) {
      const grid = document.getElementById('collectionsGrid');
      if (collections.length === 0) {
        grid.innerHTML = '<div class="empty" style="grid-column:1/-1;"><div class="ei">📁</div><h3>暂无公开收藏夹</h3></div>';
        return;
      }
      grid.innerHTML = collections.map(col => `
        <div class="collection-card" data-id="${col.id}">
          <img class="collection-cover" src="${col.cover_filename ? '/uploads/' + col.cover_filename : 'default-cover.jpg'}" alt="">
          <div class="collection-info">
            <div class="collection-name">${esc(col.name)}</div>
            <div class="collection-count">${col.image_count} 张图片</div>
          </div>
        </div>
      `).join('');
      // 添加点击事件
      document.querySelectorAll('.collection-card').forEach(card => {
        card.addEventListener('click', () => openCollection(card.dataset.id));
      });
    }
    
    // 打开收藏夹详情（可跳转到专门页面或弹出模态框）
    function openCollection(collectionId) {
      // 简单实现：跳转到 collection.html?id=xxx
      window.location.href = `/collection.html?id=${collectionId}`;
      // 若希望在当前页面弹窗展示，可复用图片详情模态框逻辑
    }
    async function loadColList() {
      const list = document.getElementById('colList');
      list.innerHTML = '<div style="color:var(--ink3);text-align:center;padding:20px">加载中…</div>';
    
      const [cr, sr] = await Promise.all([
        fetch('/me/collections',                      { headers:auth() }),
        fetch(`/images/${collectId}/my-collections`,  { headers:auth() })
      ]);
      const cols    = (await cr.json()).collections || [];
      const statMap = {};
      ((await sr.json()).collections || []).forEach(c => statMap[c.id] = c.collected);
    
      if (!cols.length) {
        list.innerHTML = '<div style="color:var(--ink3);text-align:center;padding:20px;font-size:13px">还没有收藏夹，在下方新建一个吧 ↓</div>';
        return;
      }
      list.innerHTML = '';
      cols.forEach(col => {
        const item = document.createElement('div');
        item.className = 'col-item' + (statMap[col.id] ? ' on' : '');
        item.innerHTML = `
          <span class="ci-check">${statMap[col.id] ? '✦' : '○'}</span>
          <span class="ci-name">${esc(col.name)}</span>
          <span class="ci-count">${col.image_count} 张</span>`;
        item.onclick = async () => {
          const r = await fetch(`/collections/${col.id}/images`, {
            method:'POST',
            headers:{...auth(),'Content-Type':'application/json'},
            body:JSON.stringify({image_id:collectId})
          });
          const d = await r.json();
          if (d.removed) {
            item.classList.remove('on');
            item.querySelector('.ci-check').textContent='○';
            toast('已移除收藏');
          } else {
            item.classList.add('on');
            item.querySelector('.ci-check').textContent='✦';
            toast('已收藏 ✦','ok');
          }
        };
        list.appendChild(item);
      });
    }
    window.doCreateCol = async function() {
      const name = document.getElementById('newColName').value.trim();
      if (!name) { toast('请输入名称','err'); return; }
      const isPublic = document.getElementById('newColPub').checked;
      const r = await fetch('/collections', {
        method:'POST',
        headers:{...auth(),'Content-Type':'application/json'},
        body:JSON.stringify({name, is_public:isPublic})
      });
      const d = await r.json();
      if (d.success) {
        await fetch(`/collections/${d.collectionId}/images`, {
          method:'POST',
          headers:{...auth(),'Content-Type':'application/json'},
          body:JSON.stringify({image_id:collectId})
        });
        document.getElementById('newColName').value='';
        document.getElementById('newColForm').classList.remove('on');
        toast('已创建并收藏 ✦','ok');
        loadColList();
      }
    };

    // ---------- 上传 ----------
    window.openUpload = async function() {
      if (!token) {  // 注意这里应该用 token，而不是 tk()
        location.href = '/sign_in.html';
        return;
      }
      const r = await fetch('/me/upload-quota', { headers: auth() });
      const d = await r.json();
      const pct = Math.min(100, (d.used / d.limit) * 100);
      document.getElementById('quotaFill').style.width = pct + '%';
      document.getElementById('quotaText').textContent =
        `今日已用 ${d.usedMB} / 50 MB · 剩余 ${d.remainingMB} MB`;
      openM('mUpload');
    };
    window.doUpload = async function() {
      const file = document.getElementById('fileInput').files[0];
      if (!file) { toast('请先选择图片', 'err'); return; }
      const form = new FormData();
      form.append('file', file);
      form.append('title', document.getElementById('upTitle').value);
      form.append('description', document.getElementById('upDesc').value);
      form.append('tags', document.getElementById('upTags').value);
      const r = await fetch('/images', { method: 'POST', headers: auth(), body: form });
      const d = await r.json();
      if (d.success) {
        toast('上传成功 ✦', 'ok');
        closeM('mUpload');
        document.getElementById('fileInput').value = '';
        document.getElementById('previewImg').style.display = 'none';
        document.getElementById('upTitle').value = '';
        document.getElementById('upDesc').value = '';
        document.getElementById('upTags').value = '';
        // 重新加载当前用户的图片（如果页面是用户主页）
        loadUserImages();
      } else {
        toast(d.message || '上传失败', 'err');
      }
    };

    // ---------- 初始化 ----------
    fetchMe();
    loadUserImages();

  })();
</script>
<!-- 由于篇幅，部分模态框样式和函数做了省略，实际部署时请从主站完整复制。 -->
</body>
</html>
