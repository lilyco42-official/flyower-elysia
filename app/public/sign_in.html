<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 · 云枢智创</title>
  <style>
    /* ── 重置与变量 ────────────────────────── */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --cream: #faf7f2;
      --warm: #f2ede4;
      --nude: #e8ddd0;
      --blush: #d4a5a5;
      --rose: #b87070;
      --clay: #8b5e5e;
      --ink: #2d2420;
      --ink2: #6b5c58;
      --ink3: #a49490;
      --white: #ffffff;
      --shadow: rgba(45, 36, 32, 0.08);
      --radius: 20px;
    }

    body {
      font-family: 'Noto Sans SC', system-ui, -apple-system, sans-serif;
      background: linear-gradient(145deg, var(--cream) 0%, var(--warm) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      margin: 0;
      color: var(--ink);
    }

    /* ── 主卡片 ───────────────────────────── */
    main {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1.5px solid var(--nude);
      border-radius: var(--radius);
      box-shadow: 0 20px 40px var(--shadow), 0 8px 16px rgba(0, 0, 0, 0.04);
      width: 100%;
      max-width: 420px;
      padding: 40px 32px;
      transition: transform 0.2s ease;
    }

    /* ── 标题（隐含品牌）──────────────────── */
    .brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-style: italic;
      color: var(--clay);
      text-align: center;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    .brand span {
      display: block;
      font-size: 0.8rem;
      font-style: normal;
      color: var(--ink3);
      font-family: 'Noto Sans SC', sans-serif;
      margin-top: -6px;
    }

    /* ── 表单元素 ────────────────────────── */
    form {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-top: 24px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 0.75rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: var(--ink2);
      margin-left: 4px;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      background: var(--white);
      border: 1.5px solid var(--nude);
      border-radius: 40px;
      font-size: 0.95rem;
      color: var(--ink);
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    input:focus {
      border-color: var(--blush);
      box-shadow: 0 0 0 4px rgba(212, 165, 165, 0.2);
    }

    input::placeholder {
      color: var(--ink3);
      opacity: 0.6;
    }

    button {
      background: var(--clay);
      color: white;
      border: none;
      border-radius: 40px;
      padding: 14px 20px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 8px;
      box-shadow: 0 4px 10px rgba(139, 94, 94, 0.2);
    }

    button:hover {
      background: var(--rose);
    }

    button:active {
      transform: scale(0.98);
    }

    /* ── 消息提示 ────────────────────────── */
    #message {
      margin: 20px 0 0;
      padding: 10px 16px;
      border-radius: 40px;
      font-size: 0.85rem;
      text-align: center;
      background: var(--warm);
      color: var(--ink2);
      border: 1px solid var(--nude);
      opacity: 0;
      transition: opacity 0.2s;
    }

    #message:not(:empty) {
      opacity: 1;
    }

    /* 成功/错误状态（可选） */
    #message.success {
      background: #e2f0e6;
      color: #2c6e49;
      border-color: #b8d9c6;
    }

    #message.error {
      background: #ffe2e2;
      color: #b05252;
      border-color: #f3b5b5;
    }

    /* ── 页脚链接 ────────────────────────── */
    .footer-links {
      margin-top: 24px;
      text-align: center;
      font-size: 0.85rem;
      color: var(--ink3);
    }

    .footer-links a {
      color: var(--clay);
      text-decoration: none;
      font-weight: 500;
      border-bottom: 1px dotted var(--blush);
      transition: color 0.2s;
    }

    .footer-links a:hover {
      color: var(--rose);
      border-bottom-style: solid;
    }

    /* ── 响应式微调 ──────────────────────── */
    @media (max-width: 480px) {
      main {
        padding: 32px 20px;
      }

      .brand {
        font-size: 1.8rem;
      }

      input, button {
        font-size: 0.9rem;
        padding: 12px 14px;
      }

      button {
        padding: 14px 14px;
      }
    }

    @media (max-width: 360px) {
      main {
        padding: 24px 16px;
      }
    }

    /* ── 背景纹理（可选） ─────────────────── */
    body::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: 0.02;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px;
    }
  </style>
  <!-- 字体预连接（可选，提升加载） -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
  <main>
    <div class="brand">
      📌 lain42
      <span>云枢智创 · 图片社区</span>
    </div>

    <form id="loginForm">
      <div class="field">
        <label for="login">用户名或邮箱</label>
        <input type="text" name="login" id="login" placeholder="例如：lain@example.com" required>
      </div>

      <div class="field">
        <label for="password">密码</label>
        <input type="password" id="password" name="password" placeholder="········" required>
      </div>

      <button type="submit">登录</button>
    </form>

    <div id="message"></div>

    <div class="footer-links">
      还没有账号？ <a href="/sign_up.html">立即注册</a>
    </div>
  </main>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = e.target;
      const data = {
        login: form.login.value,
        password: form.password.value
      };

      const messageDiv = document.getElementById('message');
      messageDiv.innerText = ''; // 清空之前消息
      messageDiv.className = '';  // 移除样式类

      try {
        const res = await fetch('/sign_in', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        const result = await res.json();

        if (result.success) {
          localStorage.setItem('token', result.token);
          messageDiv.innerText = '登录成功，正在跳转...';
          messageDiv.classList.add('success');
          window.location.href = '/dashboard.html';  // 根据实际首页调整
        } else {
          messageDiv.innerText = result.message || '登录失败，请检查用户名或密码';
          messageDiv.classList.add('error');
        }
      } catch (err) {
        messageDiv.innerText = '网络错误，请稍后重试';
        messageDiv.classList.add('error');
        console.error(err);
      }
    });
  </script>
</body>
</html>
